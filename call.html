<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكالمة فيديو وصوت</title>
    <!-- سنستخدم مكتبة أيقونات بسيطة وجميلة -->
    <link href="https://unpkg.com/css.gg@2.0.0/icons/css/phone.css" rel="stylesheet">
    <link href="https://unpkg.com/css.gg@2.0.0/icons/css/mic.css" rel="stylesheet">
    <link href="https://unpkg.com/css.gg@2.0.0/icons/css/mic-off.css" rel="stylesheet">
    <link href="https://unpkg.com/css.gg@2.0.0/icons/css/camera.css" rel="stylesheet">
    <link href="https://unpkg.com/css.gg@2.0.0/icons/css/no-camera.css" rel="stylesheet">
    <style>
        :root { --red: #e74c3c; --green: #2ecc71; --blue: #3498db; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #222; color: white; }

        #call-wrapper { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

        /* شاشة الفيديو الرئيسية (للطرف الآخر) */
        #remote-video { width: 100%; height: 100%; object-fit: cover; background-color: #333; }

        /* شاشة الفيديو المحلية (صورة داخل صورة) */
        #local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 20vw;
            max-width: 240px;
            min-width: 120px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        /* شاشة الانتظار قبل المكالمة */
        #pre-call-controls {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            gap: 20px;
        }
        #my-id-container { background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 10px; text-align: center; }
        #my-id { font-weight: bold; color: var(--green); user-select: all; cursor: pointer; }
        #remote-id-input { padding: 12px; border-radius: 8px; border: 1px solid #555; background: #333; color: white; font-size: 16px; text-align: center; }
        #call-btn { padding: 12px 25px; border-radius: 8px; border: none; font-size: 18px; background-color: var(--green); color: white; cursor: pointer; }

        /* أزرار التحكم أثناء المكالمة */
        #in-call-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background-color: rgba(44, 62, 80, 0.8);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: opacity 0.3s ease;
        }
        .control-btn { background: rgba(255,255,255,0.2); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; }
        .control-btn.red { background-color: var(--red); }
        .gg-icon { --ggs: 1.2; } /* لتكبير حجم الأيقونات */
    </style>
</head>
<body>
    <div id="call-wrapper">
        <video id="remote-video" autoplay></video>
        <video id="local-video" autoplay muted></video>
        
        <div id="pre-call-controls">
            <div id="my-id-container"><h3>الكود الخاص بك (انسخه وأرسله): <span id="my-id">...</span></h3></div>
            <input type="text" id="remote-id-input" placeholder="أدخل كود صديقك هنا">
            <button id="call-btn">اتصال</button>
        </div>
        
        <div id="in-call-controls" style="display: none;">
            <button id="toggle-mute-btn" class="control-btn"><i class="gg-icon gg-mic"></i></button>
            <button id="toggle-video-btn" class="control-btn"><i class="gg-icon gg-camera"></i></button>
            <button id="end-call-btn" class="control-btn red"><i class="gg-icon gg-phone"></i></button>
        </div>
    </div>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
